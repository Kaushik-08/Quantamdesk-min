services:
  postgres:
    image: postgres:16-alpine
    container_name: quantumdesk-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: quantumdesk
      POSTGRES_PASSWORD: quantumdesk
      POSTGRES_DB: quantumdesk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantumdesk -d quantumdesk"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
